spring.application.name=mvp
server.port=8080
server.servlet.context-path=/api/V1
server.forward-headers-strategy=framework

# Swagger
springdoc.swagger-ui.config-url=/api/V1/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/api/V1/v3/api-docs

# PostgreSQL (utiliser DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORD pour surcharge)
# En Docker, ces valeurs sont écrasées par SPRING_DATASOURCE_* dans docker-compose
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hotspotPay_V2}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Teda@2003}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.clean-disabled=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.repositories.enabled=false

# JWT
jwt.secret=yjRJIy3xh4XN2+pcrDy2bnYcluAwydtClB/vUbZ9SPxlCz15D35r7w0yMgusng4/
jwt.access-expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=835393032028-f4k0e218ppgtlorrhn9i3llrprovvqr6.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.client-name=Google
oauth2.google.client-id=835393032028-f4k0e218ppgtlorrhn9i3llrprovvqr6.apps.googleusercontent.com
oauth2.google.issuer=https://accounts.google.com

# Quartz
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# Mail
spring.mail.host=${MAIL_HOST:smtp.hostinger.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# MTN Mobile Money
mtn-momo.base-url=${MTN_MOMO_BASE_URL:https://sandbox.momodeveloper.mtn.com}
mtn-momo.subscription-key=${MTN_MOMO_SUBSCRIPTION_KEY:sandbox-key}
mtn-momo.api-user=${MTN_MOMO_API_USER:sandbox-user}
mtn-momo.api-key=${MTN_MOMO_API_KEY:sandbox-api-key}
mtn-momo.target-environment=${MTN_MOMO_ENV:sandbox}
mtn-momo.callback-url=${BASE_URL:http://localhost:8080}/api/V1/payments/mtn/webhook

# Orange Money
orange-money.base-url=${ORANGE_BASE_URL:https://api.orange.com/orange-money-webpay/cm/v1}
orange-money.merchant-key=${ORANGE_MONEY_KEY:}
orange-money.callback-url=${BASE_URL:http://localhost:8080}/api/V1/payments/orange/webhook

# Campay (prioritaire pour le Cameroun)
campay.permanent-token=${CAMPAY_PERMANENT_TOKEN:}
campay.username=${CAMPAY_USERNAME:}
campay.password=${CAMPAY_PASSWORD:}
campay.base-url=${CAMPAY_BASE_URL:https://demo.campay.net}
campay.callback-url=${BASE_URL:http://localhost:8080}/api/V1/payments/campay/webhook
campay.redirect-url=${BASE_URL:http://localhost:8080}/api/V1/portal/status
campay.failure-redirect-url=${BASE_URL:http://localhost:8080}/api/V1/portal/status?status=failed
campay.timeout-ms=15000
campay.token-ttl-ms=3300000

# Moneroo
moneroo.api-key=${MONEROO_API_KEY:}
moneroo.base-url=https://api.moneroo.io
moneroo.return-url=http://footboard-marshland-washable.ngrok-free.dev/api/V1/portal/status
moneroo.notify-url=https://footboard-marshland-washable.ngrok-free.dev/api/V1/payments/moneroo/webhook
moneroo.webhook-secret=${MONEROO_WEBHOOK_SECRET:}
moneroo.currency=XAF
moneroo.methods=mtn_cm,orange_cm
moneroo.timeout-ms=15000

# Jasypt
jasypt.encryptor.password=${JASYPT_KEY:}

# Portail Captif
portal.payment-polling-interval-ms=5000
portal.payment-polling-max-attempts=36
portal.session-activation-retry=3

# CORS
cors.allowed-origins=*

# Webhook IP Whitelist
webhook.allowed-ips=${WEBHOOK_ALLOWED_IPS:*}

# Router Callback IP Whitelist
router.callback.allowed-ips=${ROUTER_CALLBACK_IPS:*}

# Rate Limiting
rate-limit.portal-per-minute=100
rate-limit.auth-per-minute=100
rate-limit.webhook-per-minute=100

# Monitoring & Swagger
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# Router Pull API
app.base-url=${BASE_URL:http://localhost:8080/api/V1}

# App metadata
app.name=HotspotPay
app.api-base-url=${app.base-url:http://localhost:8080/api/V1}

# FastAPI Microservice
fastapi.base-url=${FASTAPI_BASE_URL:http://localhost:8444}
fastapi.api-key=${FASTAPI_API_KEY:change-me-to-a-strong-api-key}
fastapi.callback-secret=${FASTAPI_CALLBACK_SECRET:change-me-callback-secret}
