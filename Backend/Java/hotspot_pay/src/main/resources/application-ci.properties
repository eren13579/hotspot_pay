# ====================================================================
# Profil CI — utilisé dans GitHub Actions
# Testcontainers gère PostgreSQL automatiquement.
# Désactiver les services externes non disponibles en CI.
# ====================================================================

# Redis — pas besoin en CI (service utilise ConcurrentHashMap)
spring.redis.enabled=false

# Mail — désactiver pour éviter les timeouts
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.test-connection=false

# Logging réduit
logging.level.com.hotspotpay=INFO
logging.level.org.springframework=WARN
logging.level.org.testcontainers=INFO
