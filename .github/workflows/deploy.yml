# =====================================================================
# HotspotPay — Déploiement (Staging → Production)
# Environnements protégés avec approbation manuelle pour la production
# Images poussées vers GitHub Container Registry (ghcr.io)
# =====================================================================
name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      service:
        description: 'Service à déployer'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend-java
          - backend-fastapi
          - frontend
  push:
    branches: [main]
    paths:
      - 'Backend/**'
      - 'Frontend/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  push-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push — Backend Java
        uses: docker/build-push-action@v6
        with:
          context: Backend/Java/hotspot_pay
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend-java:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend-java:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push — Backend FastAPI
        uses: docker/build-push-action@v6
        with:
          context: Backend/Fastapi/hotspot_pay
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend-fastapi:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend-fastapi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push — Frontend
        uses: docker/build-push-action@v6
        with:
          context: Frontend/hotspot_pay
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy → Staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [push-images]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.hotspotpay.cm
    steps:
      - name: Déploiement staging
        run: |
          echo "✅ Images poussées avec succès !"
          echo "Pour déployer sur votre serveur :"
          echo "  ssh user@host 'cd /opt/hotspotpay && docker compose pull && docker compose up -d'"

  deploy-production:
    name: Deploy → Production
    if: github.event.inputs.environment == 'production'
    needs: [push-images]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://hotspotpay.cm
    concurrency: production
    steps:
      - run: echo "🚀 Déploiement production pour ${{ github.sha }}"
