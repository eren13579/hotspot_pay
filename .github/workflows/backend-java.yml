# =====================================================================
# HotspotPay — Backend Java / Spring Boot CI
# Techno : Maven · JDK 21 · Spring Boot 3.3 · Testcontainers
# Monorepo :  Backend/Java/hotspot_pay/
# =====================================================================
name: Backend Java CI

on:
  push:
    branches: [main, develop, 'release/**']
    paths:
      - 'Backend/Java/**'
      - '.github/workflows/backend-java.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Backend/Java/**'
      - '.github/workflows/backend-java.yml'

env:
  JAVA_VERSION: '21'
  JAVA_DISTRO: 'temurin'
  WORKING_DIR: Backend/Java/hotspot_pay

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: maven
          cache-dependency-path: ${{ env.WORKING_DIR }}/pom.xml
      - name: Make Maven Wrapper executable
        run: chmod +x mvnw
      - name: Compile
        run: ./mvnw compile -DskipTests --no-transfer-progress

  test:
    name: Tests (JUnit + Testcontainers)
    needs: compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: maven
          cache-dependency-path: ${{ env.WORKING_DIR }}/pom.xml
      - name: Make Maven Wrapper executable
        run: chmod +x mvnw
      - name: Run tests
        run: ./mvnw test --no-transfer-progress -Dspring.profiles.active=ci

  package:
    name: Package & Docker
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: maven
          cache-dependency-path: ${{ env.WORKING_DIR }}/pom.xml
      - name: Make Maven Wrapper executable
        run: chmod +x mvnw
      - name: Package JAR
        run: ./mvnw package -DskipTests --no-transfer-progress
      - uses: actions/upload-artifact@v4
        with:
          name: backend-java-jar
          path: ${{ env.WORKING_DIR }}/target/*.jar
          retention-days: 7
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend-java
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIR }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-java.sarif
          severity: HIGH,CRITICAL
