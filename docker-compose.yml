version: "3.9"

services:

  # ── Application Spring Boot ─────────────────────────────────────────────
  app:
    build: .
    image: hotspotpay-mvp:latest
    container_name: hotspotpay-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/hotspot_pay
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST:                 redis
      REDIS_PORT:                 6379
      REDIS_PASSWORD:             ${REDIS_PASSWORD:-}
      JWT_SECRET:                 ${JWT_SECRET}
      JASYPT_KEY:                 ${JASYPT_KEY}
      BASE_URL:                   ${BASE_URL}
      CAMPAY_USERNAME:            ${CAMPAY_USERNAME}
      CAMPAY_PASSWORD:            ${CAMPAY_PASSWORD}
      CAMPAY_BASE_URL:            ${CAMPAY_BASE_URL:-https://www.campay.net}
      MONEROO_API_KEY:            ${MONEROO_API_KEY}
      MONEROO_BASE_URL:           ${MONEROO_BASE_URL:-https://api.moneroo.io}
      MTN_MOMO_SUBSCRIPTION_KEY:  ${MTN_MOMO_SUBSCRIPTION_KEY:-}
      MTN_MOMO_API_USER:          ${MTN_MOMO_API_USER:-}
      MTN_MOMO_API_KEY:           ${MTN_MOMO_API_KEY:-}
      MAIL_HOST:                  ${MAIL_HOST:-smtp.hostinger.com}
      MAIL_PORT:                  ${MAIL_PORT:-587}
      MAIL_USERNAME:              ${MAIL_USERNAME:-}
      MAIL_PASSWORD:              ${MAIL_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/V1/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hotspotpay-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hotspot_pay
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d hotspot_pay"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hotspotpay-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
