# ============================================================
# HotspotPay — Docker Compose unifié (Production)
# Lance TOUS les services : PostgreSQL, Redis, Java, FastAPI, Frontend
#
# Usage :
#   docker-compose up -d                                    # Tout lancer
#   docker-compose up -d postgres redis                     # DB uniquement
#   docker-compose logs -f backend-java                     # Logs Java
#   docker-compose down -v                                  # Tout arrêter + volumes
#
# Variables d'environnement (créer un .env à côté) :
#   POSTGRES_PASSWORD       Mot de passe PostgreSQL
#   REDIS_PASSWORD          Mot de passe Redis (optionnel)
#   JWT_SECRET              Secret JWT (64 chars base64)
#   JASYPT_KEY              Clé Jasypt
#   MAIL_USERNAME           SMTP username
#   MAIL_PASSWORD           SMTP password
#   FASTAPI_API_KEY         Clé API FastAPI
#   FASTAPI_CALLBACK_SECRET Secret callback FastAPI↔Java
#   BASE_URL                URL publique (ex: https://hotspotpay.cm)
# ============================================================

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hotspotpay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotspotPay_V2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Teda@2003}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Crée automatiquement les bases supplémentaires au 1er démarrage
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotspotPay_V2"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hotspotpay-redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --requirepass "$$REDIS_PASSWORD";
      else
        exec redis-server;
      fi'
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "sh", "-c", "if [ -n \"$REDIS_PASSWORD\" ]; then redis-cli -a \"$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Backend Java (Spring Boot) ───────────────────────────
  backend-java:
    build:
      context: ./Backend/Java/hotspot_pay
      dockerfile: Dockerfile
    container_name: hotspotpay-java
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Connexion PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hotspotPay_V2
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-Teda@2003}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Profil Spring
      SPRING_PROFILES_ACTIVE: dev

      # Sécurité
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-32chars}
      JASYPT_KEY: ${JASYPT_KEY:-change-me-jasypt-key}

      # FastAPI
      FASTAPI_BASE_URL: http://backend-fastapi:8444
      FASTAPI_CALLBACK_SECRET: ${FASTAPI_CALLBACK_SECRET:-change-me-callback-secret}

      # Mail (optionnel en dev — valeurs factices pour éviter l'erreur health)
      MAIL_USERNAME: ${MAIL_USERNAME:-dummy}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-dummy}
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"

      # URL publique (webhooks)
      BASE_URL: ${BASE_URL:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Backend FastAPI (Python) ─────────────────────────────
  backend-fastapi:
    build:
      context: ./Backend/Fastapi/hotspot_pay
      dockerfile: Dockerfile
    container_name: hotspotpay-fastapi
    restart: unless-stopped
    ports:
      - "8444:8444"
    environment:
      PORT: 8444
      HOST: 0.0.0.0
      DEBUG: "true"

      # PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-Teda@2003}
      DB_NAME: hotspot_fastapi

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0

      # Clé API inter-service
      API_KEY: ${FASTAPI_API_KEY:-tPkv2JYxU0dniur4MnZB5qteCBJuilUNUA5VhkOEtW0=}

      # Callback vers Java
      JAVA_CALLBACK_URL: http://backend-java:8080/internal/router-callback
      JAVA_CALLBACK_SECRET: ${FASTAPI_CALLBACK_SECRET:-change-me-callback-secret}

      # CORS
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (React + Vite → Nginx) ──────────────────────
  frontend:
    build:
      context: ./Frontend/hotspot_pay
      dockerfile: Dockerfile
    container_name: hotspotpay-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend-java

volumes:
  postgres_data:
  redis_data:
