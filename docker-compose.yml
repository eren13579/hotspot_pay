version: "3.9"

services:
  hotspot-fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotspotpay-fastapi
    ports:
      - "8443:8443"
    environment:
      - APP_NAME=HotspotPay FastAPI Microservice
      - APP_VERSION=1.0.0
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8443
      - DATABASE_URL=sqlite+aiosqlite:///./data/hotspotpay.db
      - REDIS_URL=redis://redis:6379/0
      - LONG_POLL_TIMEOUT=20
      - API_KEY=${FASTAPI_API_KEY:-change-me-to-a-strong-api-key}
    volumes:
      - fastapi-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8443/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: hotspotpay-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  fastapi-data:
  redis-data:
