# ============================================================
# HotspotPay FastAPI — Docker Compose (standalone)
# Usage : docker-compose up -d
# Pour un déploiement unifié (Java + FastAPI), voir :
#   C:\Projet Patrick\docker-compose.yml
# ============================================================

version: "3.9"

services:

  hotspot-fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotspotpay-fastapi
    ports:
      - "8444:8444"
    environment:
      PORT: 8444
      HOST: 0.0.0.0
      DEBUG: "true"

      # PostgreSQL (remplace SQLite par défaut)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-Teda@2003}
      DB_NAME: hotspot_fastapi

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0

      # Sécurité
      API_KEY: ${FASTAPI_API_KEY:-change-me-to-a-strong-api-key}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173

      # Callback Java (uniquement si Java tourne aussi)
      JAVA_CALLBACK_URL: http://host.docker.internal:8080/internal/router-callback
      JAVA_CALLBACK_SECRET: ${JAVA_CALLBACK_SECRET:-change-me-callback-secret}
    volumes:
      - fastapi-data:/app/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: hotspotpay-fastapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotspot_fastapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Teda@2003}
    volumes:
      - fastapi-postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # Port 5433 pour éviter conflit avec le Java DB sur 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotspot_fastapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hotspotpay-fastapi-redis
    ports:
      - "6380:6379"   # Port 6380 pour éviter conflit
    volumes:
      - fastapi-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  fastapi-data:
  fastapi-postgres-data:
  fastapi-redis-data:
