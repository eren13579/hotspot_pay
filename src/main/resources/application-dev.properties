# -- Moneroo (DEV - sandbox) ---------------------------------------------------
moneroo.api-key=pvk_sandbox_qydku9|01KVZDKH3F9MYJV5NAQV7NJJEA
moneroo.webhook-secret=dev-webhook-secret

# -- Base de donnees -----------------------------------------------------------
spring.datasource.password=Teda@2003
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true

# -- HikariCP Connection Pool ------------------------------------------------
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=15000
spring.datasource.hikari.pool-name=HotspotPayPool

# -- Upload de fichiers --------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${user.home}/hotspotpay-uploads

# -- Server --------------------------------------------------------------------
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param
