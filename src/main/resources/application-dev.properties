# ===============================================================================
# Development Profile HotspotPay
# Activer: -Dspring.profiles.active=dev
# ===============================================================================

# -- Desactiver Google OAuth2 en dev -------------------------------------------
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# -- Swagger active en dev -----------------------------------------------------
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# -- Logging verbeux -----------------------------------------------------------
logging.level.root=INFO
logging.level.com.hotspotpay=DEBUG
logging.level.org.springframework.security=DEBUG

# -- CORS permissif ------------------------------------------------------------
cors.allowed-origins=*

# -- Webhook IP whitelist desactive -------------------------------------------
webhook.allowed-ips=*

# -- Actuator complet ----------------------------------------------------------
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# -- JWT (DEV uniquement - 64 chars base64 = 48 bytes = 384 bits) --------------
jwt.secret=yjRJIy3xh4XN2+pcrDy2bnYcluAwydtClB/vUbZ9SPxlCz15D35r7w0yMgusng4/

# -- Jasypt (DEV uniquement) ---------------------------------------------------
jasypt.encryptor.password=ae9800c5cac2cbc6cc8a3da4a4065a43

# -- FastAPI (DEV) -------------------------------------------------------------
fastapi.api-key=An7urOjzoLG4o1cY7scp29JsNhVZ2jaxp6rxWsUrKvU
fastapi.callback-secret=vxMzkIObGDLvyjnsaAFlQA==
